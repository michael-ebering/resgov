services:
  resgov:
    build: .
    container_name: resgov
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - resgov-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.resgov.rule=Host(`resgov.silentops.cloud`)"
      - "traefik.http.routers.resgov.entrypoints=websecure"
      - "traefik.http.routers.resgov.tls.certresolver=letsencrypt"
      - "traefik.http.services.resgov.loadbalancer.server.port=8080"

volumes:
  resgov-data:
