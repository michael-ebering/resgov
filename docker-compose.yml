services:
  resgov:
    build: .
    container_name: resgov-api
    restart: unless-stopped
    networks:
      - resgov_default
    ports:
      - "127.0.0.1:8080:8080"
    expose:
      - "8080"
    volumes:
      - resgov-data:/data
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.resgov.rule=Host(`api.resgov.silentops.cloud`)"
      - "traefik.http.routers.resgov.entrypoints=websecure"
      - "traefik.http.routers.resgov.tls.certresolver=letsencrypt"
      - "traefik.http.services.resgov.loadbalancer.server.port=8080"

volumes:
  resgov-data:

networks:
  resgov_default:
    name: resgov_default
    external: true